<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadence · Goal & Hours Tracker</title>
  <meta name="description" content="Set goals, log your hours, and track daily progress." />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0D8A80" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>

    * { font-family: Inter, system-ui, -apple-system, sans-serif; }
    body { margin: 0; background: #ECF0EE; }
    input:focus, textarea:focus { border-color: #0D8A80 !important; box-shadow: 0 0 0 3px #D8ECE9; }
    @keyframes pulse { 0%,100%{ opacity:1 } 50%{ opacity:.35 } }
    .listening { animation: pulse 1s infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

/* ---------- theme ---------- */
const T = {
  ink:"#14202B", sub:"#5B6B73", paper:"#ECF0EE", surface:"#FFFFFF",
  line:"#DCE3E0", teal:"#0D8A80", tealDark:"#0B6B63", tealSoft:"#D8ECE9",
  amber:"#C77D2E", rose:"#B23A48", green:"#4C8C4A",
};
const GOAL_TYPES = ["Learning","Career","Fitness","Project","Creative","Finance","Personal","Other"];
const TYPE_COLOR = {
  Learning:"#0D8A80", Career:"#3D6BB3", Fitness:"#C77D2E", Project:"#7A5AA8",
  Creative:"#B23A48", Finance:"#4C8C4A", Personal:"#B0863C", Other:"#5B6B73",
};

/* ---------- inline svg icons ---------- */
function Icon({ name, size=16, color="currentColor", style }){
  const c = { width:size, height:size, viewBox:"0 0 24 24", fill:"none", stroke:color, strokeWidth:2, strokeLinecap:"round", strokeLinejoin:"round", style };
  const F = React.Fragment;
  const p = {
    target:<F><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/></F>,
    plus:<F><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></F>,
    clock:<F><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></F>,
    calendar:<F><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></F>,
    x:<F><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></F>,
    trash:<F><polyline points="3 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></F>,
    check:<polyline points="20 6 9 17 4 12"/>,
    flame:<path d="M12 2s5 4 5 9a5 5 0 0 1-10 0c0-1.6.6-2.7 1.2-3.6C8.5 10 12 8.2 12 2z"/>,
    trend:<F><polyline points="3 17 9 11 13 15 21 7"/><polyline points="15 7 21 7 21 13"/></F>,
    chevronLeft:<polyline points="15 18 9 12 15 6"/>,
    timer:<F><circle cx="12" cy="13" r="8"/><line x1="12" y1="13" x2="12" y2="9"/><line x1="9" y1="2" x2="15" y2="2"/></F>,
    mic:<F><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M19 10a7 7 0 0 1-14 0"/><line x1="12" y1="17" x2="12" y2="21"/><line x1="8" y1="21" x2="16" y2="21"/></F>,
    image:<F><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.8"/><path d="M21 15l-5-5L5 21"/></F>,
    bell:<F><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></F>,
    edit:<F><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></F>,
    flag:<F><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V4s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></F>,
    sparkles:<F><path d="M12 3l1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9l4.4-1.6z"/><path d="M19 15l.8 2.2L22 18l-2.2.8L19 21l-.8-2.2L16 18l2.2-.8z"/></F>,
  };
  return <svg {...c}>{p[name]}</svg>;
}

/* ---------- date helpers ---------- */
const dayMs = 86400000;
const iso = (d)=>{ const x=new Date(d); return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,"0")}-${String(x.getDate()).padStart(2,"0")}`; };
const today = ()=>iso(new Date());
const parseISO = (s)=>{ const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); };
const daysBetween = (a,b)=>Math.round((parseISO(b)-parseISO(a))/dayMs);
const prettyDate = (s)=>parseISO(s).toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"});

/* ---------- storage ---------- */
const STORE_KEY = "cadence:data:v1";
function loadData(){ try { const r=localStorage.getItem(STORE_KEY); return r?JSON.parse(r):{goals:[]}; } catch(e){ return {goals:[]}; } }
function saveData(d){ try { localStorage.setItem(STORE_KEY, JSON.stringify(d)); return true; } catch(e){ console.error(e); return false; } }
const uid = ()=>Math.random().toString(36).slice(2,10);

/* ---------- notifications ---------- */
function notify(title, body){
  try {
    const opts = { body, icon:"icon-192.png", badge:"icon-192.png" };
    if (navigator.serviceWorker && navigator.serviceWorker.ready) {
      navigator.serviceWorker.ready.then(reg=>reg.showNotification(title, opts)).catch(()=>{ new Notification(title, opts); });
    } else { new Notification(title, opts); }
  } catch(e){ /* not supported */ }
}

/* ---------- voice ---------- */
const SR = typeof window!=="undefined" ? (window.SpeechRecognition || window.webkitSpeechRecognition) : null;
function MicButton({ onText, size=18, title="Dictate" }){
  const [listening,setListening]=useState(false);
  if(!SR) return null;
  const start=()=>{
    try{
      const r=new SR(); r.lang="en-US"; r.interimResults=false; r.maxAlternatives=1;
      r.onresult=(e)=>{ onText(e.results[0][0].transcript); };
      r.onend=()=>setListening(false); r.onerror=()=>setListening(false);
      setListening(true); r.start();
    }catch(e){ setListening(false); }
  };
  return (
    <button type="button" onClick={start} title={title}
      className={"rounded-lg p-2 "+(listening?"listening":"")}
      style={{ background:listening?T.rose:T.tealSoft, color:listening?"#fff":T.teal }}>
      <Icon name="mic" size={size}/>
    </button>
  );
}
// pull "N hours/hrs" out of a spoken phrase
function parseSpokenGoal(text){
  let title=text.trim(), est=null;
  const m=title.match(/(\d+(?:\.\d+)?)\s*(?:hours?|hrs?)/i);
  if(m){ est=Number(m[1]); title=title.replace(m[0],"").replace(/\bfor\b\s*$/i,"").trim(); }
  title=title.replace(/^\s*(add|create|new|a|goal|to)\s+/i,"").trim();
  if(title) title=title[0].toUpperCase()+title.slice(1);
  return { title, estimatedHours:est };
}

/* ---------- goal-prompt interpreter (turns an instruction into a goal draft) ---------- */
const WORD_NUM={one:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9,ten:10,eleven:11,twelve:12,thirteen:13,fourteen:14,fifteen:15,sixteen:16,seventeen:17,eighteen:18,nineteen:19,twenty:20,thirty:30,forty:40,fifty:50,sixty:60,seventy:70,eighty:80,ninety:90,hundred:100};
const NUMTOK="(\\d+(?:\\.\\d+)?|half|an|a|one|two|three|four|five|six|seven|eight|nine|ten|eleven|twelve|thirteen|fourteen|fifteen|sixteen|seventeen|eighteen|nineteen|twenty|thirty|forty|fifty|sixty|seventy|eighty|ninety|hundred)";
function tokNum(t){ t=(t||"").toLowerCase(); if(/^\d/.test(t)) return parseFloat(t); if(t==="half") return .5; if(t==="a"||t==="an") return 1; return WORD_NUM[t]??null; }
function grabAmt(text,unit){ const m=text.match(new RegExp("\\b"+NUMTOK+"\\b\\s*"+unit,"i")); return m?tokNum(m[1]):null; }
const TYPE_RULES=[
  ["Fitness",/(fitness|gym|workout|exercise|running|run|jog|weight|muscle|yoga|cardio|steps|marathon|training|\bfit\b)/i],
  ["Learning",/(learn|study|read|reading|course|language|spanish|french|german|math|coding|programming|python|degree|exam|certificat|skill|tutorial|book)/i],
  ["Creative",/(write|writing|novel|paint|painting|draw|drawing|music|guitar|piano|design|art|photograph|blog|video|song)/i],
  ["Finance",/(save|saving|budget|invest|money|debt|income|expense|fund)/i],
  ["Career",/(career|job|promotion|interview|resume|\bcv\b|network)/i],
  ["Project",/(project|build|launch|ship|app|website|startup|product|portfolio)/i],
];
function parseGoalPrompt(raw){
  const text=(raw||"").trim(); const low=text.toLowerCase();
  let type="Personal"; for(const [t,re] of TYPE_RULES){ if(re.test(low)){ type=t; break; } }
  const hasDaily=/\b(daily|per day|a day|each day|every day)\b/i.test(low);
  const hoursAmt=grabAmt(low,"(?:hours?|hrs?)");
  const minsAmt=grabAmt(low,"(?:minutes?|mins?)");
  const perDay=hoursAmt!=null?hoursAmt:(minsAmt!=null?+(minsAmt/60).toFixed(2):null);
  let dailyTarget=null, estimatedHours=null;
  if(hasDaily) dailyTarget=perDay; else if(hoursAmt!=null) estimatedHours=hoursAmt;
  const durText=low.replace(new RegExp(NUMTOK+"\\s*(?:hours?|hrs?|minutes?|mins?)","ig")," ").replace(/\b(per day|a day|each day|every day|daily)\b/ig," ");
  let days=grabAmt(durText,"days?");
  if(days==null){ const w=grabAmt(durText,"weeks?"); if(w!=null) days=Math.round(w*7); }
  if(days==null){ const mo=grabAmt(durText,"months?"); if(mo!=null) days=Math.round(mo*30); }
  if(days==null) days=30;
  const targetDate=iso(new Date(Date.now()+days*dayMs));
  if(dailyTarget!=null && estimatedHours==null) estimatedHours=Math.round(dailyTarget*days);
  let title=null;
  const gm=text.match(/goals?\s+(?:to|of|about|:)\s+(.+)/i);
  title=gm?gm[1]:text.replace(/^(please\s+)?(create|add|make|set up|start|build|new)\s+(a|an|the)?\s*/i,"");
  title=title
    .replace(/,?\s*(where|with|and)\b.*$/i,"")
    .replace(/\b(for|in|over|within|by|during|next)\s+\S.*$/i,"")
    .replace(new RegExp(NUMTOK+"\\s*(?:hours?|hrs?|minutes?|mins?)","ig")," ")
    .replace(/\b(?:in\s+total|total|overall|altogether|per day|a day|each day|every day|daily)\b/ig," ")
    .replace(/\bgoals?\b/ig," ")
    .replace(/\s{2,}/g," ").replace(/^[\s,;:.]+/,"").replace(/[\s,;:.]+$/,"").trim();
  if(!title || title.toLowerCase()===type.toLowerCase()) title=type+" goal";
  title=title.charAt(0).toUpperCase()+title.slice(1);
  return { title, type, targetDate, dailyTarget, estimatedHours };
}

/* ---------- image scaling ---------- */
function fileToScaledDataUrl(file, max=1200, quality=0.7){
  return new Promise((res,rej)=>{
    const img=new Image(); const url=URL.createObjectURL(file);
    img.onload=()=>{
      const scale=Math.min(1, max/Math.max(img.width,img.height));
      const w=Math.round(img.width*scale), h=Math.round(img.height*scale);
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      res(cv.toDataURL("image/jpeg", quality));
    };
    img.onerror=(e)=>{ URL.revokeObjectURL(url); rej(e); };
    img.src=url;
  });
}

/* ---------- goal math ---------- */
function goalStats(goal){
  const logs=goal.logs||[];
  const totalHours=logs.reduce((s,l)=>s+l.hours,0);
  const t=today();
  const todayHours=logs.filter(l=>l.date===t).reduce((s,l)=>s+l.hours,0);
  const daysLeft=daysBetween(t, goal.targetDate);
  const overdue=daysLeft<0;
  let pct=null,remainingHours=null,requiredPace=null;
  if(goal.estimatedHours&&goal.estimatedHours>0){
    pct=Math.min(100,(totalHours/goal.estimatedHours)*100);
    remainingHours=Math.max(0, goal.estimatedHours-totalHours);
    const dl=Math.max(1,daysLeft);
    requiredPace=daysLeft<=0?remainingHours:remainingHours/dl;
  }
  const bar=goal.dailyTarget&&goal.dailyTarget>0?goal.dailyTarget:0.01;
  const byDay={}; logs.forEach(l=>{ byDay[l.date]=(byDay[l.date]||0)+l.hours; });
  let streak=0;
  for(let i=0;i<400;i++){ const d=iso(new Date(Date.now()-i*dayMs)); if((byDay[d]||0)>=bar) streak++; else break; }
  return { totalHours, todayHours, daysLeft, overdue, pct, remainingHours, requiredPace, streak };
}

/* ---------- small ui ---------- */
function Badge({ children, color }){
  return <span className="inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium" style={{ background:color+"22", color }}>{children}</span>;
}
function Field({ label, hint, children }){
  return <label className="block mb-4">
    <div className="flex items-baseline justify-between mb-1">
      <span className="text-sm font-medium" style={{ color:T.ink }}>{label}</span>
      {hint&&<span className="text-xs" style={{ color:T.sub }}>{hint}</span>}
    </div>{children}
  </label>;
}
const inputStyle={ width:"100%", padding:"9px 12px", borderRadius:10, border:`1px solid ${T.line}`, background:"#fff", color:T.ink, fontSize:14, outline:"none" };
function Chips({ options, value, onChange, colorMap }){
  return <div className="flex flex-wrap gap-2">
    {options.map(o=>(
      <button type="button" key={o} onClick={()=>onChange(o)} className="rounded-full px-3 py-1.5 text-sm font-medium transition"
        style={{ background:value===o?(colorMap?colorMap[o]:T.teal):"#fff", color:value===o?"#fff":T.sub, border:`1px solid ${value===o?(colorMap?colorMap[o]:T.teal):T.line}` }}>{o}</button>
    ))}
  </div>;
}

/* ---------- svg bar chart ---------- */
function BarChartSVG({ data, target }){
  const W=560,H=170,padL=26,padR=10,padT=10,padB=26;
  const iw=W-padL-padR, ih=H-padT-padB;
  const max=Math.max(target||0, ...data.map(d=>d.hours), 1);
  const niceMax=Math.ceil(max*1.15*4)/4 || 1;
  const bw=iw/data.length;
  const yFor=(v)=>padT+ih-(v/niceMax)*ih;
  const ticks=[0, niceMax/2, niceMax];
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ display:"block" }}>
      {ticks.map((tk,i)=>(<g key={i}>
        <line x1={padL} y1={yFor(tk)} x2={W-padR} y2={yFor(tk)} stroke={T.line} strokeWidth="1"/>
        <text x={padL-6} y={yFor(tk)+3} textAnchor="end" fontSize="9" fill={T.sub}>{(+tk.toFixed(2))}</text>
      </g>))}
      {target?(<g>
        <line x1={padL} y1={yFor(target)} x2={W-padR} y2={yFor(target)} stroke={T.amber} strokeWidth="1.5" strokeDasharray="4 4"/>
        <text x={W-padR} y={yFor(target)-4} textAnchor="end" fontSize="9" fill={T.amber}>goal {target}h</text>
      </g>):null}
      {data.map((d,i)=>{
        const x=padL+i*bw, bh=(d.hours/niceMax)*ih, gap=bw*0.22;
        return (<g key={i}>
          {d.hours>0&&<rect x={x+gap} y={yFor(d.hours)} width={bw-gap*2} height={Math.max(0,bh)} rx="3" fill={d.isToday?T.tealDark:T.teal}><title>{d.day}: {d.hours}h</title></rect>}
          {i%2===0&&<text x={x+bw/2} y={H-8} textAnchor="middle" fontSize="8.5" fill={T.sub}>{d.day}</text>}
        </g>);
      })}
    </svg>
  );
}

/* ---------- goal modal (create + edit, voice-enabled) ---------- */
function GoalModal({ initial, onClose, onSave }){
  const editing = initial && initial.id;
  const [title,setTitle]=useState(initial?.title||"");
  const [type,setType]=useState(initial?.type||"Learning");
  const [targetDate,setTargetDate]=useState(initial?.targetDate||iso(new Date(Date.now()+30*dayMs)));
  const [dailyTarget,setDailyTarget]=useState(initial?.dailyTarget??"");
  const [estimatedHours,setEstimatedHours]=useState(initial?.estimatedHours??"");
  const [reminderTime,setReminderTime]=useState(initial?.reminderTime||"");
  const [err,setErr]=useState("");

  const submit=()=>{
    if(!title.trim()) return setErr("Give your goal a name.");
    if(!targetDate) return setErr("Pick a target date.");
    onSave({
      id: initial?.id || uid(),
      title:title.trim(), type, targetDate,
      dailyTarget: dailyTarget?Number(dailyTarget):null,
      estimatedHours: estimatedHours?Number(estimatedHours):null,
      reminderTime: reminderTime||null,
      createdAt: initial?.createdAt || today(),
      logs: initial?.logs || [],
      images: initial?.images || [],
    });
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4" style={{ background:"rgba(20,32,43,0.45)" }} onClick={onClose}>
      <div className="w-full sm:max-w-lg rounded-t-3xl sm:rounded-2xl p-6" style={{ background:T.surface, maxHeight:"92vh", overflowY:"auto" }} onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between mb-5">
          <h2 className="text-xl font-semibold" style={{ color:T.ink, fontFamily:"Fraunces, Georgia, serif" }}>{editing?"Edit goal":"New goal"}</h2>
          <button onClick={onClose} className="rounded-full p-1" style={{ color:T.sub }}><Icon name="x" size={20}/></button>
        </div>

        <Field label="What are you working toward?" hint={SR?"tap mic to dictate":null}>
          <div className="flex gap-2">
            <input style={inputStyle} value={title} autoFocus onChange={e=>setTitle(e.target.value)} placeholder="e.g. Learn Spanish B1"/>
            <MicButton onText={(t)=>setTitle(t)} title="Dictate goal name"/>
          </div>
        </Field>

        <Field label="Type"><Chips options={GOAL_TYPES} value={type} onChange={setType} colorMap={TYPE_COLOR}/></Field>

        <Field label="Target completion date">
          <input type="date" style={inputStyle} value={targetDate} onChange={e=>setTargetDate(e.target.value)}/>
        </Field>

        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <Field label="Daily hours goal" hint="optional">
            <input type="number" min="0" step="0.25" style={inputStyle} value={dailyTarget} onChange={e=>setDailyTarget(e.target.value)} placeholder="e.g. 1.5"/>
          </Field>
          <Field label="Total hours estimate" hint="optional">
            <input type="number" min="0" step="1" style={inputStyle} value={estimatedHours} onChange={e=>setEstimatedHours(e.target.value)} placeholder="e.g. 120"/>
          </Field>
        </div>

        <Field label="Daily reminder" hint="optional · fires while app is open">
          <input type="time" style={inputStyle} value={reminderTime} onChange={e=>setReminderTime(e.target.value)}/>
        </Field>

        {err&&<p className="text-sm mb-3" style={{ color:T.rose }}>{err}</p>}
        <button onClick={submit} className="w-full rounded-xl py-3 font-medium text-white transition" style={{ background:T.teal }}>{editing?"Save changes":"Create goal"}</button>
      </div>
    </div>
  );
}

/* ---------- goal card ---------- */
function GoalCard({ goal, active, onSelect }){
  const s=goalStats(goal);
  return (
    <button onClick={onSelect} className="w-full text-left rounded-2xl p-4 mb-3 transition"
      style={{ background:T.surface, border:`1px solid ${active?T.teal:T.line}`, boxShadow:active?`0 0 0 3px ${T.tealSoft}`:"none" }}>
      <div className="flex items-start justify-between gap-2 mb-2">
        <span className="font-medium leading-snug" style={{ color:T.ink }}>{goal.title}</span>
        <Badge color={TYPE_COLOR[goal.type]}>{goal.type}</Badge>
      </div>
      {s.pct!==null&&(
        <div className="mb-2">
          <div className="h-2 w-full rounded-full overflow-hidden" style={{ background:T.tealSoft }}>
            <div className="h-full rounded-full transition-all" style={{ width:`${s.pct}%`, background:T.teal }}/>
          </div>
          <div className="text-xs mt-1" style={{ color:T.sub }}>{Math.round(s.pct)}% · {s.totalHours}h of {goal.estimatedHours}h</div>
        </div>
      )}
      <div className="flex items-center gap-3 text-xs flex-wrap" style={{ color:T.sub }}>
        <span className="inline-flex items-center gap-1"><Icon name="clock" size={13}/> {s.totalHours}h</span>
        <span className="inline-flex items-center gap-1" style={{ color:s.overdue?T.rose:T.sub }}><Icon name="calendar" size={13}/>{s.overdue?`${Math.abs(s.daysLeft)}d overdue`:`${s.daysLeft}d left`}</span>
        {goal.dailyTarget&&s.streak>0&&<span className="inline-flex items-center gap-1" style={{ color:T.amber }}><Icon name="flame" size={13}/> {s.streak}</span>}
        {(goal.images||[]).length>0&&<span className="inline-flex items-center gap-1"><Icon name="image" size={13}/> {(goal.images||[]).length}</span>}
        {goal.reminderTime&&<span className="inline-flex items-center gap-1"><Icon name="bell" size={13}/> {goal.reminderTime}</span>}
      </div>
    </button>
  );
}

function Stat({ icon, label, value, tone }){
  return <div className="rounded-2xl p-4" style={{ background:T.surface, border:`1px solid ${T.line}` }}>
    <div className="flex items-center gap-1.5 mb-1 text-xs" style={{ color:T.sub }}><Icon name={icon} size={13}/>{label}</div>
    <div className="text-2xl font-semibold" style={{ color:tone||T.ink, fontFamily:"Fraunces, Georgia, serif" }}>{value}</div>
  </div>;
}

/* ---------- goal detail ---------- */
function GoalDetail({ goal, onBack, onUpdate, onDelete, onEdit }){
  const [hours,setHours]=useState("");
  const [logDate,setLogDate]=useState(today());
  const [note,setNote]=useState("");
  const [imgErr,setImgErr]=useState("");
  const fileRef=useRef(null);
  const s=useMemo(()=>goalStats(goal),[goal]);

  const addLog=()=>{ const h=Number(hours); if(!h||h<=0) return;
    onUpdate({ ...goal, logs:[{ id:uid(), date:logDate, hours:h, note:note.trim() }, ...(goal.logs||[])] });
    setHours(""); setNote(""); };
  const removeLog=(id)=>onUpdate({ ...goal, logs:goal.logs.filter(l=>l.id!==id) });

  const onFiles=async(e)=>{
    setImgErr("");
    const files=Array.from(e.target.files||[]);
    let imgs=[...(goal.images||[])];
    for(const f of files){
      try{ const data=await fileToScaledDataUrl(f); imgs.push({ id:uid(), data, name:f.name }); }
      catch(err){ setImgErr("Couldn't read one of the images."); }
    }
    const next={ ...goal, images:imgs };
    const ok=onUpdate(next, true);
    if(ok===false){ setImgErr("Storage is full — try fewer or smaller images."); }
    if(fileRef.current) fileRef.current.value="";
  };
  const removeImage=(id)=>onUpdate({ ...goal, images:(goal.images||[]).filter(i=>i.id!==id) });

  const chartData=useMemo(()=>{
    const byDay={}; (goal.logs||[]).forEach(l=>{ byDay[l.date]=(byDay[l.date]||0)+l.hours; });
    const arr=[];
    for(let i=13;i>=0;i--){ const d=iso(new Date(Date.now()-i*dayMs));
      arr.push({ day:parseISO(d).toLocaleDateString(undefined,{day:"numeric",month:"short"}), hours:+(byDay[d]||0).toFixed(2), isToday:d===today() }); }
    return arr;
  },[goal.logs]);

  const dailyDone=goal.dailyTarget?s.todayHours>=goal.dailyTarget:s.todayHours>0;
  const images=goal.images||[];

  return (
    <div>
      <button onClick={onBack} className="lg:hidden inline-flex items-center gap-1 mb-3 text-sm" style={{ color:T.sub }}><Icon name="chevronLeft" size={16}/> All goals</button>
      <div className="flex items-start justify-between gap-3 mb-4">
        <div>
          <div className="flex items-center gap-2 mb-1 flex-wrap">
            <Badge color={TYPE_COLOR[goal.type]}>{goal.type}</Badge>
          </div>
          <h1 className="text-2xl font-semibold leading-tight" style={{ color:T.ink, fontFamily:"Fraunces, Georgia, serif" }}>{goal.title}</h1>
          <p className="text-sm mt-1" style={{ color:T.sub }}>Target: {prettyDate(goal.targetDate)}{goal.reminderTime?` · reminder ${goal.reminderTime}`:""}</p>
        </div>
        <div className="flex gap-1 shrink-0">
          <button onClick={()=>onEdit(goal)} className="rounded-lg p-2" style={{ color:T.sub }} title="Edit goal"><Icon name="edit" size={18}/></button>
          <button onClick={()=>onDelete(goal.id)} className="rounded-lg p-2" style={{ color:T.sub }} title="Delete goal"><Icon name="trash" size={18}/></button>
        </div>
      </div>

      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-5">
        <Stat icon="clock" label="Total logged" value={`${s.totalHours}h`}/>
        <Stat icon="calendar" label={s.overdue?"Overdue":"Days left"} value={s.overdue?`${Math.abs(s.daysLeft)}d`:`${s.daysLeft}d`} tone={s.overdue?T.rose:T.ink}/>
        {goal.dailyTarget?<Stat icon="flame" label="Streak" value={`${s.streak}d`} tone={T.amber}/>:<Stat icon="trend" label="Days active" value={new Set((goal.logs||[]).map(l=>l.date)).size}/>}
        {s.pct!==null?<Stat icon="target" label="Complete" value={`${Math.round(s.pct)}%`} tone={T.teal}/>:<Stat icon="timer" label="Today" value={`${s.todayHours}h`} tone={dailyDone?T.teal:T.ink}/>}
      </div>

      {s.pct!==null&&(
        <div className="rounded-2xl p-4 mb-5" style={{ background:T.surface, border:`1px solid ${T.line}` }}>
          <div className="flex justify-between text-sm mb-2" style={{ color:T.sub }}><span>{s.totalHours}h of {goal.estimatedHours}h</span><span>{s.remainingHours}h to go</span></div>
          <div className="h-3 w-full rounded-full overflow-hidden" style={{ background:T.tealSoft }}><div className="h-full rounded-full transition-all" style={{ width:`${s.pct}%`, background:T.teal }}/></div>
          {s.remainingHours>0&&(
            <p className="text-sm mt-2" style={{ color:T.sub }}>Suggested pace:{" "}
              <span style={{ color:s.overdue?T.rose:T.ink, fontWeight:600 }}>{s.requiredPace.toFixed(2)}h / day</span>{" "}
              {s.overdue?"to finish now (past target)":`for the next ${Math.max(1,s.daysLeft)} days`}
              {goal.dailyTarget&&!s.overdue&&s.requiredPace>goal.dailyTarget&&<span style={{ color:T.amber }}> · above your {goal.dailyTarget}h/day goal</span>}
            </p>)}
        </div>
      )}

      {goal.dailyTarget&&(
        <div className="rounded-2xl p-4 mb-5 flex items-center justify-between" style={{ background:dailyDone?T.tealSoft:T.surface, border:`1px solid ${dailyDone?T.teal:T.line}` }}>
          <div>
            <div className="text-sm font-medium" style={{ color:T.ink }}>{dailyDone?"Daily goal met":"Today's progress"}</div>
            <div className="text-sm" style={{ color:T.sub }}>{s.todayHours}h of {goal.dailyTarget}h goal</div>
          </div>
          <div className="flex items-center gap-2">
            {dailyDone&&<Icon name="check" size={18} color={T.teal}/>}
            <div className="w-28 h-2 rounded-full overflow-hidden" style={{ background:"#fff" }}><div className="h-full rounded-full" style={{ width:`${Math.min(100,(s.todayHours/goal.dailyTarget)*100)}%`, background:T.teal }}/></div>
          </div>
        </div>
      )}

      {/* log time */}
      <div className="rounded-2xl p-4 mb-5" style={{ background:T.surface, border:`1px solid ${T.line}` }}>
        <div className="text-sm font-medium mb-3" style={{ color:T.ink }}>Log time</div>
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 items-end">
          <label className="block"><span className="text-xs" style={{ color:T.sub }}>Hours</span>
            <input type="number" min="0" step="0.25" value={hours} onChange={e=>setHours(e.target.value)} placeholder="0" style={inputStyle}/></label>
          <label className="block"><span className="text-xs" style={{ color:T.sub }}>Date</span>
            <input type="date" value={logDate} max={today()} onChange={e=>setLogDate(e.target.value)} style={inputStyle}/></label>
          <label className="block col-span-2 sm:col-span-1"><span className="text-xs" style={{ color:T.sub }}>Note</span>
            <div className="flex gap-2">
              <input value={note} onChange={e=>setNote(e.target.value)} placeholder="optional" style={inputStyle}/>
              <MicButton onText={(t)=>setNote(t)} size={16} title="Dictate note"/>
            </div>
          </label>
          <button onClick={addLog} className="rounded-xl py-2.5 font-medium text-white inline-flex items-center justify-center gap-1" style={{ background:T.teal }}><Icon name="plus" size={16}/> Add</button>
        </div>
      </div>

      {/* attachments */}
      <div className="rounded-2xl p-4 mb-5" style={{ background:T.surface, border:`1px solid ${T.line}` }}>
        <div className="flex items-center justify-between mb-3">
          <div className="text-sm font-medium" style={{ color:T.ink }}>Attachments</div>
          <button onClick={()=>fileRef.current&&fileRef.current.click()} className="inline-flex items-center gap-1 rounded-lg px-3 py-1.5 text-sm font-medium" style={{ background:T.tealSoft, color:T.teal }}><Icon name="image" size={15}/> Add image</button>
          <input ref={fileRef} type="file" accept="image/*" multiple capture="environment" onChange={onFiles} style={{ display:"none" }}/>
        </div>
        {imgErr&&<p className="text-sm mb-2" style={{ color:T.rose }}>{imgErr}</p>}
        {images.length===0
          ? <p className="text-sm py-2" style={{ color:T.sub }}>Add screenshots, whiteboard photos, or reference shots for this goal.</p>
          : <div className="grid grid-cols-3 sm:grid-cols-4 gap-2">
              {images.map(im=>(
                <div key={im.id} className="relative rounded-lg overflow-hidden" style={{ border:`1px solid ${T.line}` }}>
                  <img src={im.data} alt={im.name} style={{ width:"100%", height:90, objectFit:"cover", display:"block" }}/>
                  <button onClick={()=>removeImage(im.id)} className="absolute top-1 right-1 rounded-full p-1" style={{ background:"rgba(20,32,43,0.6)", color:"#fff" }}><Icon name="x" size={12}/></button>
                </div>
              ))}
            </div>}
      </div>

      {/* chart */}
      <div className="rounded-2xl p-4 mb-5" style={{ background:T.surface, border:`1px solid ${T.line}` }}>
        <div className="text-sm font-medium mb-3" style={{ color:T.ink }}>Last 14 days</div>
        <BarChartSVG data={chartData} target={goal.dailyTarget}/>
      </div>

      {/* history */}
      <div className="rounded-2xl p-4" style={{ background:T.surface, border:`1px solid ${T.line}` }}>
        <div className="text-sm font-medium mb-3" style={{ color:T.ink }}>History</div>
        {(goal.logs||[]).length===0
          ? <p className="text-sm py-4 text-center" style={{ color:T.sub }}>No hours logged yet. Add your first session above.</p>
          : <div className="divide-y" style={{ borderColor:T.line }}>
              {goal.logs.map(l=>(
                <div key={l.id} className="flex items-center justify-between py-2.5">
                  <div><span className="font-medium" style={{ color:T.ink }}>{l.hours}h</span>
                    <span className="text-sm ml-2" style={{ color:T.sub }}>{prettyDate(l.date)}</span>
                    {l.note&&<span className="text-sm ml-2" style={{ color:T.sub }}>· {l.note}</span>}</div>
                  <button onClick={()=>removeLog(l.id)} className="p-1" style={{ color:T.sub }}><Icon name="trash" size={15}/></button>
                </div>
              ))}
            </div>}
      </div>
    </div>
  );
}

/* ---------- app ---------- */
function App(){
  const [data,setData]=useState(()=>loadData());
  const [selectedId,setSelectedId]=useState(null);
  const [modal,setModal]=useState(null); // null | {} (new) | goal (edit) | draft
  const [prompt,setPrompt]=useState("");
  const [notifPerm,setNotifPerm]=useState(typeof Notification!=="undefined"?Notification.permission:"unsupported");
  const firedRef=useRef({});

  const persist=(next)=>{ const ok=saveData(next); if(ok) setData(next); return ok; };
  const upsertGoal=(g)=>{
    const exists=data.goals.some(x=>x.id===g.id);
    const next={ goals: exists ? data.goals.map(x=>x.id===g.id?g:x) : [g,...data.goals] };
    const ok=persist(next);
    if(ok&&!exists) setSelectedId(g.id);
    if(ok) setModal(null);
    return ok;
  };
  const updateGoal=(g, silent)=>{ const ok=persist({ goals:data.goals.map(x=>x.id===g.id?g:x) }); return ok; };
  const deleteGoal=(id)=>{ persist({ goals:data.goals.filter(x=>x.id!==id) }); setSelectedId(null); };

  const requestNotif=async()=>{
    if(typeof Notification==="undefined") return;
    const p=await Notification.requestPermission();
    setNotifPerm(p);
    if(p==="granted") notify("Reminders on","We'll nudge you here when it's time to work on a goal.");
  };

  // foreground reminder scheduler
  useEffect(()=>{
    const iv=setInterval(()=>{
      if(typeof Notification==="undefined"||Notification.permission!=="granted") return;
      const now=new Date();
      const hhmm=`${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
      const td=today();
      data.goals.forEach(g=>{
        if(!g.reminderTime||g.reminderTime!==hhmm) return;
        if(firedRef.current[g.id]===td) return;
        firedRef.current[g.id]=td;
        const s=goalStats(g);
        const met=g.dailyTarget?s.todayHours>=g.dailyTarget:s.todayHours>0;
        if(met) return;
        notify(g.title, g.dailyTarget?`Reminder: log toward your ${g.dailyTarget}h goal today.`:"Reminder: make progress on this goal today.");
      });
    }, 20000);
    return ()=>clearInterval(iv);
  },[data.goals]);

  const selected=data.goals.find(g=>g.id===selectedId);

  const voiceQuickAdd=()=>{
    if(!SR) return;
    try{
      const r=new SR(); r.lang="en-US"; r.interimResults=false;
      r.onresult=(e)=>{ const parsed=parseSpokenGoal(e.results[0][0].transcript); setModal({ ...parsed }); };
      r.start();
    }catch(e){}
  };

  const runAgent=()=>{ const p=prompt.trim(); if(!p) return; setModal(parseGoalPrompt(p)); setPrompt(""); };

  return (
    <div style={{ background:T.paper, minHeight:"100vh", color:T.ink }}>
      <div className="max-w-6xl mx-auto px-4 sm:px-6 py-6">
        <header className="flex items-center justify-between mb-6">
          <div className="flex items-center gap-2">
            <div className="rounded-xl p-2" style={{ background:T.teal }}><Icon name="target" size={20} color="#fff"/></div>
            <div>
              <h1 className="text-lg font-semibold leading-none" style={{ fontFamily:"Fraunces, Georgia, serif" }}>Cadence</h1>
              <p className="text-xs" style={{ color:T.sub }}>goal &amp; hours tracker</p>
            </div>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={requestNotif} title={notifPerm==="granted"?"Reminders enabled":"Enable reminders"}
              className="rounded-xl p-2.5" style={{ background:notifPerm==="granted"?T.tealSoft:"#fff", color:notifPerm==="granted"?T.teal:T.sub, border:`1px solid ${T.line}` }}>
              <Icon name="bell" size={18}/>
            </button>
            {SR&&<button onClick={voiceQuickAdd} title="Add goal by voice" className="rounded-xl p-2.5" style={{ background:"#fff", color:T.teal, border:`1px solid ${T.line}` }}><Icon name="mic" size={18}/></button>}
            <button onClick={()=>setModal({})} className="inline-flex items-center gap-1.5 rounded-xl px-4 py-2.5 font-medium text-white" style={{ background:T.teal }}>
              <Icon name="plus" size={18}/> <span className="hidden sm:inline">New goal</span>
            </button>
          </div>
        </header>

        {/* assistant: describe a goal in plain language */}
        <div className="rounded-2xl p-3 mb-5" style={{ background:T.surface, border:`1px solid ${T.line}` }}>
          <div className="flex items-center gap-2">
            <span style={{ color:T.teal }}><Icon name="sparkles" size={18}/></span>
            <input value={prompt} onChange={e=>setPrompt(e.target.value)}
              onKeyDown={e=>{ if(e.key==="Enter") runAgent(); }}
              placeholder="Describe a goal, e.g. Fitness goal for 50 days, 2 hours daily"
              className="flex-1" style={{ ...inputStyle, border:"none", padding:"6px 4px", flex:1 }}/>
            <MicButton onText={(t)=>setPrompt(t)} size={16} title="Dictate instruction"/>
            <button onClick={runAgent} className="rounded-xl px-4 py-2 font-medium text-white shrink-0" style={{ background:T.teal }}>Generate</button>
          </div>
        </div>

        {data.goals.length===0?(
          <div className="text-center py-20 rounded-3xl" style={{ background:T.surface, border:`1px dashed ${T.line}` }}>
            <div className="inline-flex rounded-2xl p-3 mb-4" style={{ background:T.tealSoft }}><Icon name="target" size={28} color={T.teal}/></div>
            <h2 className="text-xl font-semibold mb-1" style={{ fontFamily:"Fraunces, Georgia, serif" }}>Set your first goal</h2>
            <p className="text-sm mb-5 max-w-sm mx-auto" style={{ color:T.sub }}>Set a target and date, then log hours as you go. Use the mic to add one by voice.</p>
            <button onClick={()=>setModal({})} className="inline-flex items-center gap-1.5 rounded-xl px-5 py-2.5 font-medium text-white" style={{ background:T.teal }}><Icon name="plus" size={18}/> New goal</button>
          </div>
        ):(
          <div className="grid grid-cols-1 lg:grid-cols-5 gap-6">
            <div className={`lg:col-span-2 ${selected?"hidden lg:block":""}`}>
              <div className="text-xs uppercase tracking-wide mb-2 font-medium" style={{ color:T.sub }}>Your goals ({data.goals.length})</div>
              {data.goals.map(g=>(<GoalCard key={g.id} goal={g} active={g.id===selectedId} onSelect={()=>setSelectedId(g.id)}/>))}
            </div>
            <div className={`lg:col-span-3 ${selected?"":"hidden lg:block"}`}>
              {selected
                ? <GoalDetail goal={selected} onBack={()=>setSelectedId(null)} onUpdate={updateGoal} onDelete={deleteGoal} onEdit={(g)=>setModal(g)}/>
                : <div className="text-center py-24 rounded-3xl" style={{ background:T.surface, border:`1px solid ${T.line}`, color:T.sub }}>Select a goal to track its progress.</div>}
            </div>
          </div>
        )}
      </div>

      {modal&&<GoalModal initial={modal} onClose={()=>setModal(null)} onSave={upsertGoal}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch((e) => console.log("SW failed", e));
      });
    }
  </script>
</body>
</html>
